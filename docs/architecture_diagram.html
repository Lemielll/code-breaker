<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Code Breaker — Layered Architecture (Interactive SVG)</title>
<style>
  body{margin:0;background:#0d1117;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;padding:20px}
  #tt{position:fixed;background:#161b22;color:#e6edf3;border:1px solid #58a6ff;border-radius:6px;padding:10px 14px;font-size:12px;max-width:300px;pointer-events:none;opacity:0;transition:opacity .2s;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.5);line-height:1.4}
  #tt .t{font-weight:700;color:#58a6ff;margin-bottom:4px}
</style>
</head>
<body>
<div id="tt"><div class="t"></div><div class="b"></div></div>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 700" width="1060" height="700">
  <defs>
    <linearGradient id="gc" x1="0%" y1="0%" x2="100%"><stop offset="0%" style="stop-color:#1a3a5c"/><stop offset="100%" style="stop-color:#0d2137"/></linearGradient>
    <linearGradient id="ga" x1="0%" y1="0%" x2="100%"><stop offset="0%" style="stop-color:#2d1b4e"/><stop offset="100%" style="stop-color:#1a0f30"/></linearGradient>
    <linearGradient id="gs" x1="0%" y1="0%" x2="100%"><stop offset="0%" style="stop-color:#1b3a2a"/><stop offset="100%" style="stop-color:#0f2419"/></linearGradient>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%"><stop offset="0%" style="stop-color:#3a2a1b"/><stop offset="100%" style="stop-color:#241910"/></linearGradient>
    <linearGradient id="gi" x1="0%" y1="0%" x2="100%"><stop offset="0%" style="stop-color:#3a1b1b"/><stop offset="100%" style="stop-color:#241010"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity=".4"/></filter>
  </defs>
  <text x="530" y="30" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">Code Breaker — Layered Architecture</text>
  <text x="530" y="48" text-anchor="middle" fill="#8b949e" font-size="11">React SPA + Node.js REST API + PostgreSQL</text>

  <!-- Layer 1: Presentation -->
  <rect x="30" y="60" width="1000" height="105" rx="10" fill="url(#gc)" stroke="#58a6ff" stroke-width="1.5" filter="url(#sh)"/>
  <text x="50" y="82" fill="#58a6ff" font-size="10" font-weight="700" opacity=".8">LAYER 1 — PRESENTATION (React SPA)</text>
  <g class="c" data-tip="React SPA|React 18 + React Router + Vite. Component-based SPA, CSR." style="cursor:pointer"><rect x="50" y="92" width="160" height="52" rx="7" fill="#0d2137" stroke="#58a6ff" stroke-width="1" opacity=".9"/><text x="130" y="115" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">⚛️ React SPA</text><text x="130" y="132" text-anchor="middle" fill="#8b949e" font-size="9">Router + Context</text></g>
  <g class="c" data-tip="Game UI|GameBoard, GuessRow, HexInput, FeedbackIndicator, ScoreDisplay. State via Context." style="cursor:pointer"><rect x="230" y="92" width="160" height="52" rx="7" fill="#0d2137" stroke="#58a6ff" stroke-width="1" opacity=".9"/><text x="310" y="115" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">🎮 Game UI</text><text x="310" y="132" text-anchor="middle" fill="#8b949e" font-size="9">Board, Input, Feedback</text></g>
  <g class="c" data-tip="Auth Module|Login/Register forms, JWT storage, auto-refresh, auth context." style="cursor:pointer"><rect x="410" y="92" width="160" height="52" rx="7" fill="#0d2137" stroke="#58a6ff" stroke-width="1" opacity=".9"/><text x="490" y="115" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">🔐 Auth Module</text><text x="490" y="132" text-anchor="middle" fill="#8b949e" font-size="9">JWT, Context API</text></g>
  <g class="c" data-tip="API Client|Axios wrapper. Auto Authorization header, 401 refresh, error interceptor." style="cursor:pointer"><rect x="590" y="92" width="160" height="52" rx="7" fill="#0d2137" stroke="#58a6ff" stroke-width="1" opacity=".9"/><text x="670" y="115" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">🌐 API Client</text><text x="670" y="132" text-anchor="middle" fill="#8b949e" font-size="9">Axios + Interceptors</text></g>
  <g class="c" data-tip="Admin Panel|PuzzleForm, PuzzleList, Dashboard. Protected route (role check)." style="cursor:pointer"><rect x="770" y="92" width="160" height="52" rx="7" fill="#0d2137" stroke="#58a6ff" stroke-width="1" opacity=".9"/><text x="850" y="115" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">🛠️ Admin Panel</text><text x="850" y="132" text-anchor="middle" fill="#8b949e" font-size="9">Puzzle CRUD</text></g>
  <text x="530" y="180" text-anchor="middle" fill="#8b949e" font-size="9">▼ HTTPS / REST ▼</text>

  <!-- Layer 2: API Gateway -->
  <rect x="30" y="190" width="1000" height="105" rx="10" fill="url(#ga)" stroke="#a371f7" stroke-width="1.5" filter="url(#sh)"/>
  <text x="50" y="212" fill="#a371f7" font-size="10" font-weight="700" opacity=".8">LAYER 2 — API GATEWAY &amp; MIDDLEWARE (Express.js)</text>
  <g class="c" data-tip="Router|/api/v1/auth/*, /api/v1/games/*, /api/v1/leaderboard/*, /api/v1/admin/*" style="cursor:pointer"><rect x="50" y="222" width="140" height="52" rx="7" fill="#1a0f30" stroke="#a371f7" stroke-width="1" opacity=".9"/><text x="120" y="252" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="600">🛣️ Router</text></g>
  <g class="c" data-tip="JWT Auth|Verify signature, check expiry, extract userId+role. 401 if invalid." style="cursor:pointer"><rect x="210" y="222" width="140" height="52" rx="7" fill="#1a0f30" stroke="#a371f7" stroke-width="1" opacity=".9"/><text x="280" y="252" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="600">🔑 JWT Auth</text></g>
  <g class="c" data-tip="RBAC|Check req.user.role vs required role. Admin only endpoints → 403." style="cursor:pointer"><rect x="370" y="222" width="130" height="52" rx="7" fill="#1a0f30" stroke="#a371f7" stroke-width="1" opacity=".9"/><text x="435" y="252" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="600">🛡️ RBAC</text></g>
  <g class="c" data-tip="Rate Limiter|Login: 5/min/IP. Global: 100/min/IP. HTTP 429 + Retry-After." style="cursor:pointer"><rect x="520" y="222" width="140" height="52" rx="7" fill="#1a0f30" stroke="#a371f7" stroke-width="1" opacity=".9"/><text x="590" y="252" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="600">⏱️ Rate Limiter</text></g>
  <g class="c" data-tip="Validator|express-validator. Sanitize + validate: hex 4char, nickname 3-16 alphanum." style="cursor:pointer"><rect x="680" y="222" width="140" height="52" rx="7" fill="#1a0f30" stroke="#a371f7" stroke-width="1" opacity=".9"/><text x="750" y="252" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="600">✅ Validator</text></g>
  <g class="c" data-tip="Helmet|Security headers: X-Frame, HSTS, CSP, X-Content-Type. CORS whitelist." style="cursor:pointer"><rect x="840" y="222" width="140" height="52" rx="7" fill="#1a0f30" stroke="#a371f7" stroke-width="1" opacity=".9"/><text x="910" y="252" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="600">🪖 Helmet+CORS</text></g>

  <!-- Layer 3: Business Logic -->
  <rect x="30" y="320" width="1000" height="105" rx="10" fill="url(#gs)" stroke="#3fb950" stroke-width="1.5" filter="url(#sh)"/>
  <text x="50" y="342" fill="#3fb950" font-size="10" font-weight="700" opacity=".8">LAYER 3 — BUSINESS LOGIC (SERVICE LAYER)</text>
  <g class="c" data-tip="AuthService|register, login, logout, refreshToken, updateProfile. bcrypt + JWT." style="cursor:pointer"><rect x="50" y="352" width="148" height="52" rx="7" fill="#0f2419" stroke="#3fb950" stroke-width="1" opacity=".9"/><text x="124" y="382" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">🔐 AuthService</text></g>
  <g class="c" data-tip="GameService|startGame, submitGuess, getState. Code gen, feedback compute, score calc." style="cursor:pointer"><rect x="218" y="352" width="148" height="52" rx="7" fill="#0f2419" stroke="#3fb950" stroke-width="1" opacity=".9"/><text x="292" y="382" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">🎮 GameService</text></g>
  <g class="c" data-tip="DailyService|getDailyChallenge, generateDailyCode. SHA256(date+secret) seed." style="cursor:pointer"><rect x="386" y="352" width="148" height="52" rx="7" fill="#0f2419" stroke="#3fb950" stroke-width="1" opacity=".9"/><text x="460" y="382" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">📅 DailyService</text></g>
  <g class="c" data-tip="LeaderboardService|getTopScores, getUserRank. Indexed queries, pagination." style="cursor:pointer"><rect x="554" y="352" width="148" height="52" rx="7" fill="#0f2419" stroke="#3fb950" stroke-width="1" opacity=".9"/><text x="628" y="382" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">🏆 LeaderboardSvc</text></g>
  <g class="c" data-tip="ProgressionService|addXP, checkLevelUp, updateStreak, evaluateAchievements. Transactional." style="cursor:pointer"><rect x="722" y="352" width="148" height="52" rx="7" fill="#0f2419" stroke="#3fb950" stroke-width="1" opacity=".9"/><text x="796" y="382" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">📈 ProgressionSvc</text></g>
  <g class="c" data-tip="AdminService|createPuzzle, updateStatus, getDashboardStats. Caesar hex logic." style="cursor:pointer"><rect x="890" y="352" width="120" height="52" rx="7" fill="#0f2419" stroke="#3fb950" stroke-width="1" opacity=".9"/><text x="950" y="382" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">🛠️ AdminSvc</text></g>

  <!-- Layer 4: Data Access -->
  <rect x="30" y="450" width="1000" height="85" rx="10" fill="url(#gd)" stroke="#f0883e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="50" y="472" fill="#f0883e" font-size="10" font-weight="700" opacity=".8">LAYER 4 — DATA ACCESS (Prisma ORM)</text>
  <g class="c" data-tip="Prisma Client|Type-safe queries, auto prepared statements, migrations." style="cursor:pointer"><rect x="50" y="482" width="180" height="38" rx="6" fill="#241910" stroke="#f0883e" stroke-width="1" opacity=".9"/><text x="140" y="506" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">🔷 Prisma ORM</text></g>
  <g class="c" data-tip="UserRepo|findByUsername, create, updateProfile, updateStats." style="cursor:pointer"><rect x="250" y="482" width="140" height="38" rx="6" fill="#241910" stroke="#f0883e" stroke-width="1" opacity=".9"/><text x="320" y="506" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">👤 UserRepo</text></g>
  <g class="c" data-tip="GameRepo|createSession, addGuess, updateSession. Transaction support." style="cursor:pointer"><rect x="410" y="482" width="140" height="38" rx="6" fill="#241910" stroke="#f0883e" stroke-width="1" opacity=".9"/><text x="480" y="506" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">🎮 GameRepo</text></g>
  <g class="c" data-tip="PuzzleRepo|create, findPublished, updateStatus, getDashboardStats." style="cursor:pointer"><rect x="570" y="482" width="140" height="38" rx="6" fill="#241910" stroke="#f0883e" stroke-width="1" opacity=".9"/><text x="640" y="506" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">🧩 PuzzleRepo</text></g>
  <g class="c" data-tip="AchievementRepo|findByUser, unlock. UNIQUE(user_id, badge_id)." style="cursor:pointer"><rect x="730" y="482" width="150" height="38" rx="6" fill="#241910" stroke="#f0883e" stroke-width="1" opacity=".9"/><text x="805" y="506" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">🏅 AchievementRepo</text></g>

  <!-- Layer 5: Infrastructure -->
  <rect x="30" y="560" width="1000" height="75" rx="10" fill="url(#gi)" stroke="#f85149" stroke-width="1.5" filter="url(#sh)"/>
  <text x="50" y="582" fill="#f85149" font-size="10" font-weight="700" opacity=".8">LAYER 5 — INFRASTRUCTURE</text>
  <g class="c" data-tip="PostgreSQL 14+|7 tabel, backup pg_dump cron hourly, connection pool." style="cursor:pointer"><rect x="50" y="592" width="190" height="32" rx="6" fill="#241010" stroke="#f85149" stroke-width="1" opacity=".9"/><text x="145" y="613" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600">🐘 PostgreSQL 14+</text></g>
  <g class="c" data-tip="Node.js 18 LTS|Single-instance, PM2 process manager." style="cursor:pointer"><rect x="260" y="592" width="170" height="32" rx="6" fill="#241010" stroke="#f85149" stroke-width="1" opacity=".9"/><text x="345" y="613" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600">🟢 Node.js 18 LTS</text></g>
  <g class="c" data-tip="Logger|Winston/Pino JSON structured logging. Levels: error, warn, info, audit." style="cursor:pointer"><rect x="450" y="592" width="160" height="32" rx="6" fill="#241010" stroke="#f85149" stroke-width="1" opacity=".9"/><text x="530" y="613" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600">📝 Structured Logger</text></g>
  <g class="c" data-tip="Health Check|GET /health → status, DB connectivity, version, uptime." style="cursor:pointer"><rect x="630" y="592" width="150" height="32" rx="6" fill="#241010" stroke="#f85149" stroke-width="1" opacity=".9"/><text x="705" y="613" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600">❤️ Health Check</text></g>
  <g class="c" data-tip="Env Config|dotenv: .env.development/.staging/.production. Secrets dari env vars." style="cursor:pointer"><rect x="800" y="592" width="150" height="32" rx="6" fill="#241010" stroke="#f85149" stroke-width="1" opacity=".9"/><text x="875" y="613" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600">⚙️ Env Config</text></g>

  <!-- Layer labels on right -->
  <text x="1040" y="117" fill="#58a6ff" font-size="9" text-anchor="end" opacity=".6">L1</text>
  <text x="1040" y="247" fill="#a371f7" font-size="9" text-anchor="end" opacity=".6">L2</text>
  <text x="1040" y="377" fill="#3fb950" font-size="9" text-anchor="end" opacity=".6">L3</text>
  <text x="1040" y="502" fill="#f0883e" font-size="9" text-anchor="end" opacity=".6">L4</text>
  <text x="1040" y="610" fill="#f85149" font-size="9" text-anchor="end" opacity=".6">L5</text>
</svg>
<script>
const tt=document.getElementById('tt'),t1=tt.querySelector('.t'),t2=tt.querySelector('.b');
document.querySelectorAll('[data-tip]').forEach(el=>{
  el.addEventListener('mouseenter',e=>{const[a,b]=el.dataset.tip.split('|');t1.textContent=a;t2.textContent=b||'';tt.style.opacity='1';const r=el.querySelector('rect');if(r){r.setAttribute('stroke-width','2.5');r.style.filter='brightness(1.3)'}});
  el.addEventListener('mousemove',e=>{tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-50)+'px'});
  el.addEventListener('mouseleave',()=>{tt.style.opacity='0';const r=el.querySelector('rect');if(r){r.setAttribute('stroke-width','1');r.style.filter=''}});
});
</script>
</body>
</html>
